<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDCC Off-Sites 2026 | Elly Glitch</title>

    <link rel="stylesheet" href="styles.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<header>

    <div class="logo">

        <h1>SDCC Off-Sites 2026</h1>

        <p>Interactive Event Guide by Elly Glitch</p>

    </div>

</header>


<section class="hero">

    <h2>Find Your Next Adventure</h2>

    <p>
        Browse every off-site event happening during San Diego Comic-Con.
    </p>

</section>


<section class="controls">

    <input
        type="text"
        id="search"
        placeholder="Search events..."
    >

</section>


<section class="calendar">

    <button class="day active" data-day="Wednesday">
        Wednesday
        <span>July 22</span>
    </button>

    <button class="day" data-day="Thursday">
        Thursday
        <span>July 23</span>
    </button>

    <button class="day" data-day="Friday">
        Friday
        <span>July 24</span>
    </button>

    <button class="day" data-day="Saturday">
        Saturday
        <span>July 25</span>
    </button>

    <button class="day" data-day="Sunday">
        Sunday
        <span>July 26</span>
    </button>

</section>


<section class="filters">

    <button class="filter">All</button>

    <button class="filter purple">Activations</button>

    <button class="filter green">Food</button>

    <button class="filter blue">Meetups</button>

    <button class="filter orange">Parties</button>

    <button class="filter red">Shows</button>

    <button class="filter">Free</button>

    <button class="filter">Paid</button>

</section>


<main>

    <aside class="sidebar">

        <h3>Today's Events</h3>

        <p>
            Select a day to load events.
        </p>

    </aside>

    <section id="events">

        <!-- Event cards load here -->

    </section>

</main>


<footer>

    <p>

        Created by Elly Glitch

    </p>

    <p>

        Updated for San Diego Comic-Con 2026

    </p>

</footer>


<script src="script.js"></script>

</body>

</html>
